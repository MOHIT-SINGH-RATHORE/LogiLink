spring.application.name=transport-backend
spring.datasource.url=jdbc:mysql://localhost:3306/transport_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=rootpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
logilink.app.jwtSecret=${JWT_SECRET:LogiLinkSecretKeyThatIsVeryLongAndSecureForHS256Algorithm1234567890}
logilink.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
